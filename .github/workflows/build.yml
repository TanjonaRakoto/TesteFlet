name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.1"
          channel: "stable"

      - name: Accept Android licenses
        run: |
          yes | flutter doctor --android-licenses || true

      - name: Install Android SDK build tools
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install Flet CLI
        run: pip install flet==0.25.2

      - name: Build APK
        run: echo -e "\n\n\n\n" | flet build apk --org com.example --project LuckyNumber --no-rich-output
        env:
          CI: true
          FLET_CLI_NO_PROMPT: "true"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lucky-number-apk
          path: build/apk/*.apk
          if-no-files-found: error
